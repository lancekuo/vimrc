# =============================================================================
# DEFAULT KEY BINDINGS REFERENCE (prefix = Ctrl+])
# =============================================================================
# Sessions:
#   prefix $          Rename session
#   prefix d          Detach from session
#   prefix s          List/switch sessions
#   prefix (  )       Switch to previous/next session
#
# Windows:
#   prefix c          New window
#   prefix ,          Rename window         <- use this!
#   prefix &          Kill window
#   prefix n  p       Next/previous window
#   prefix 0-9        Switch to window by number
#   prefix w          List/switch windows
#   prefix f          Find window by name
#
# Panes:
#   prefix %          Split vertical        (overridden below to keep cwd)
#   prefix "          Split horizontal      (overridden below to keep cwd)
#   prefix x          Kill pane
#   prefix z          Toggle pane zoom
#   prefix {  }       Swap pane left/right
#   prefix o          Cycle through panes
#   prefix q          Show pane numbers
#   prefix !          Break pane into window
#
# Copy mode:
#   prefix [          Enter copy mode
#   prefix ]          Paste buffer
#
# Misc:
#   prefix ?          List all keybindings
#   prefix t          Show clock
# =============================================================================

# https://github.com/seebi/tmux-colors-solarized/blob/master/tmuxcolors-256.conf
set-option -g status-style bg=colour235,fg=colour136,default # bg=base02, fg=yellow

# easy reload config
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded."

# set window split
bind-key v split-window -h
bind-key b split-window

# default window title colors
set-window-option -g window-status-style fg=colour244,bg=default,dim # fg=base0

# active window title colors
set-window-option -g window-status-current-style fg=colour166,bg=default,bright # fg=orange

# pane border
set-option -g pane-border-style fg=colour235 #fg=base02
set-option -g pane-active-border-style fg=colour2 #fg=base01

# message text
set-option -g message-style bg=colour235,fg=colour166 # bg=base02, fg=orange

# pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange
# clock
set-window-option -g clock-mode-colour green #green


set -g status-interval 1
set -g status-justify centre # center align window list
set -g status-left-length 20
set -g status-right-length 140
# set -g status-left '#[fg=green]#H #[fg=black]• #[fg=green,bright]#(uname -r | cut -c 1-6)#[default]'
# set -g status-right '#[fg=green,bg=default,bright]#(tmux-mem-cpu-load) #[fg=red,dim,bg=default]#(uptime | cut -f 4-5 -d " " | cut -f 1 -d ",") #[fg=white,bg=default]%a%l:%M:%S %p#[default] #[fg=blue]%Y-%m-%d'
set -g status-left '#[default]'
set -g status-right '#[default]'
# Status bar: powerline glyphs on macOS/Windows Terminal, ASCII fallback on basic terminals
if-shell "uname | grep -qi darwin" \
  'set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"; \
   set -g status-right "#[fg=#f5c2e7]#(whoami) #[fg=#89b4fa]│ #[fg=#cba6f7]%Y-%m-%d %H:%M #[bg=#89b4fa,fg=#1e1e2e,bold] #h "' \
  'if-shell "test -n \"$WT_SESSION\"" \
    "set -g status-left \"#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]\"; \
     set -g status-right \"#[fg=#f5c2e7]#(whoami) #[fg=#89b4fa]│ #[fg=#cba6f7]%Y-%m-%d %H:%M #[bg=#89b4fa,fg=#1e1e2e,bold] #h \"" \
    "set -g status-left \"#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]>\"; \
     set -g status-right \"#[fg=#f5c2e7]#(whoami) #[fg=#89b4fa]| #[fg=#cba6f7]%Y-%m-%d %H:%M #[bg=#89b4fa,fg=#1e1e2e,bold]< #h \""'
set -g status-left-length 50
set -g status-right-length 100

# C-b is not acceptable -- Vim uses it
unbind C-b
set-option -g prefix C-]
bind-key C-] last-window

# Start numbering at 0
set -g base-index 0

# Allows for faster key repetition
set -s escape-time 50

# Rather than constraining window size to the maximum size of any client 
# connected to the *session*, constrain window size to the maximum size of any 
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on

# Allows us to use C-a a <command> to send commands to a TMUX session inside 
# another TMUX session
bind-key a send-prefix
bind ] send-prefix # send prefix through to inner session: C-] ]

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# hjkl pane traversal
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# set to main-horizontal, 66% height for main pane
bind m run-shell "~/.tmux/scripts/resize-adaptable.sh -l main-horizontal -p 66"
# Same thing for verical layouts
bind M run-shell "~/.tmux/scripts/resize-adaptable.sh -l main-vertical -p 50"

bind-key C command-prompt -p "Name of new window: " "new-window -n '%%'"

# reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# auto window rename
set-window-option -g automatic-rename

# https://github.com/edkolev/dots/blob/master/tmux.conf
# Updates for tmux 1.9's current pane splitting paths.

# from powerline
run-shell "tmux set-environment -g TMUX_VERSION_MAJOR $(tmux -V | cut -d' ' -f2 | cut -d'.' -f1 | sed 's/[^0-9]*//g')"
run-shell "tmux set-environment -g TMUX_VERSION_MINOR $(tmux -V | cut -d' ' -f2 | cut -d'.' -f2 | sed 's/[^0-9]*//g')"

# Vi copypaste mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection

# Cross-platform clipboard: pbcopy on macOS, clip.exe on WSL/Windows
if-shell "uname | grep -qi darwin" \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"; \
   bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"; \
   bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"; \
   bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"; \
   bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip.exe"'

# status bar
if-shell '\( #{$TMUX_VERSION_MAJOR} -eq 2 -a #{$TMUX_VERSION_MINOR} -lt 2\) -o #{$TMUX_VERSION_MAJOR} -le 1' 'set-option -g status-utf8 on'

set -g mouse on

# Enter copy-mode on scroll-up (makes scroll work in Terminal.app)
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind-key -n WheelDownPane select-pane -t= \; send-keys -M
# fix pane_current_path on new window and splits
if-shell "test '#{$TMUX_VERSION_MAJOR} -gt 1 -o \( #{$TMUX_VERSION_MAJOR} -eq 1 -a #{$TMUX_VERSION_MINOR} -ge 8 \)'" 'unbind c; bind c new-window -c "#{pane_current_path}"'
if-shell "test '#{$TMUX_VERSION_MAJOR} -gt 1 -o \( #{$TMUX_VERSION_MAJOR} -eq 1 -a #{$TMUX_VERSION_MINOR} -ge 8 \)'" "unbind '\"'; bind '\"' split-window -v -c '#{pane_current_path}'"
if-shell "test '#{$TMUX_VERSION_MAJOR} -gt 1 -o \( #{$TMUX_VERSION_MAJOR} -eq 1 -a #{$TMUX_VERSION_MINOR} -ge 8 \)'" 'unbind v; bind v split-window -h -c "#{pane_current_path}"'
if-shell "test '#{$TMUX_VERSION_MAJOR} -gt 1 -o \( #{$TMUX_VERSION_MAJOR} -eq 1 -a #{$TMUX_VERSION_MINOR} -ge 8 \)'" 'unbind "%"; bind % split-window -h -c "#{pane_current_path}"'

# Enable passthrough for notifications
set -g allow-passthrough on

# Colors — true color passthrough so vim/terminal colorschemes render correctly
# tmux-256color works on macOS; on WSL, xterm-256color is safer if tmux-256color terminfo is missing
if-shell "uname | grep -qi darwin" \
  'set -g default-terminal "tmux-256color"' \
  'if-shell "infocmp tmux-256color >/dev/null 2>&1" \
    "set -g default-terminal tmux-256color" \
    "set -g default-terminal xterm-256color"'
set -ga terminal-overrides ",*:Tc"
# Windows Terminal supports true color natively; add override for its $TERM values
set -ga terminal-overrides ",xterm-256color:Tc"
